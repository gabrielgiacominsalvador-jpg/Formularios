<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Fase 4</title>
    <link rel="stylesheet" href="./ex09.css">
</head>
<body>
    <div class="container">
        <h2>Formulário Completo</h2>
        <form>
            <label>Nome:</label>
            <input type="text" name="nome">

            <label>Email:</label>
            <input type="email" name="email">

            <label>Mensagem:</label>
            <textarea name="mensagem"></textarea>

            <div class="row">
                <label>
                    <input class="inline" type="checkbox" name="termos"> Aceitar termos
                </label>
            </div>

            <div class="row">
                <label>Tipo:</label>
                <label><input class="inline" type="radio" name="tipo" value="aluno"> Aluno</label>
                <label><input class="inline" type="radio" name="tipo" value="professor"> Professor</label>
            </div>

            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
